name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux amd64
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: nodefy-agent-linux-amd64
            
          # Linux arm64
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            artifact: nodefy-agent-linux-arm64
            
          # Windows amd64
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact: nodefy-agent-windows-amd64.exe
            
          # Windows arm64
          - os: windows-11-arm
            goos: windows
            goarch: arm64
            artifact: nodefy-agent-windows-arm64.exe
            
          # macOS Intel
          - os: macos-15-intel
            goos: darwin
            goarch: amd64
            artifact: nodefy-agent-darwin-amd64
            bundle: Nodefy-Agent-macOS-Intel.zip
            
          # macOS Apple Silicon
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact: nodefy-agent-darwin-arm64
            bundle: Nodefy-Agent-macOS.zip

    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      # Linux: Install systray dependencies
      - name: Install Linux dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgtk-3-dev libayatana-appindicator3-dev

      # Linux: Build
      - name: Build (Linux)
        if: matrix.goos == 'linux'
        env:
          CGO_ENABLED: 1
        run: |
          go build -ldflags="-s -w" -o ${{ matrix.artifact }} ./cmd/agent

      # Windows: Build
      - name: Build (Windows)
        if: matrix.goos == 'windows'
        env:
          CGO_ENABLED: 1
        run: |
          go build -ldflags="-s -w" -o ${{ matrix.artifact }} ./cmd/agent

      # macOS: Build binary and create signed .app bundle
      - name: Build (macOS)
        if: matrix.goos == 'darwin'
        env:
          CGO_ENABLED: 1
          GOARCH: ${{ matrix.goarch }}
        run: |
          # Build the binary
          go build -ldflags="-s -w" -o ${{ matrix.artifact }} ./cmd/agent
          
          # Create .app bundle
          mkdir -p "Nodefy Agent.app/Contents/MacOS"
          mkdir -p "Nodefy Agent.app/Contents/Resources"
          cp ${{ matrix.artifact }} "Nodefy Agent.app/Contents/MacOS/Nodefy Agent"
          
          # Create Info.plist
          printf '%s\n' '<?xml version="1.0" encoding="UTF-8"?>' \
            '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
            '<plist version="1.0">' \
            '<dict>' \
            '    <key>CFBundleExecutable</key>' \
            '    <string>Nodefy Agent</string>' \
            '    <key>CFBundleIdentifier</key>' \
            '    <string>com.nodefy.agent</string>' \
            '    <key>CFBundleName</key>' \
            '    <string>Nodefy Agent</string>' \
            '    <key>CFBundleDisplayName</key>' \
            '    <string>Nodefy Agent</string>' \
            '    <key>CFBundleVersion</key>' \
            '    <string>0.2.0</string>' \
            '    <key>CFBundleShortVersionString</key>' \
            '    <string>0.2.0</string>' \
            '    <key>CFBundlePackageType</key>' \
            '    <string>APPL</string>' \
            '    <key>LSUIElement</key>' \
            '    <true/>' \
            '    <key>LSMinimumSystemVersion</key>' \
            '    <string>11.0</string>' \
            '    <key>NSHighResolutionCapable</key>' \
            '    <true/>' \
            '</dict>' \
            '</plist>' > "Nodefy Agent.app/Contents/Info.plist"
          
          # Ad-hoc code signing
          codesign --force --deep --sign - "Nodefy Agent.app"
          
          # Zip the app bundle
          zip -r "${{ matrix.bundle }}" "Nodefy Agent.app"

      # Upload binary artifact (for Electron embedding)
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 30

      # Upload macOS bundle (for standalone download)
      - name: Upload macOS bundle
        if: matrix.goos == 'darwin'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.bundle }}
          path: ${{ matrix.bundle }}
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - name: List binaries
        run: ls -la binaries/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: binaries/*
          generate_release_notes: true
