name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux amd64 - with systray
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            cgo: 1
            name: nodefy-agent-linux-amd64
          # Linux arm64 - without systray (no native runner)
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            cgo: 0
            name: nodefy-agent-linux-arm64
          # Windows amd64 - with systray
          - os: windows-latest
            goos: windows
            goarch: amd64
            cgo: 1
            name: nodefy-agent-windows-amd64.exe
          # Windows arm64 - without systray (cross-compile)
          - os: windows-latest
            goos: windows
            goarch: arm64
            cgo: 0
            name: nodefy-agent-windows-arm64.exe
          # macOS Intel - without systray (cross-compile on arm64 runner)
          - os: macos-latest
            goos: darwin
            goarch: amd64
            cgo: 0
            name: nodefy-agent-darwin-amd64
          # macOS Apple Silicon - with systray
          - os: macos-latest
            goos: darwin
            goarch: arm64
            cgo: 1
            name: nodefy-agent-darwin-arm64

    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Linux dependencies
        if: matrix.goos == 'linux' && matrix.cgo == 1
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgtk-3-dev libayatana-appindicator3-dev

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          go build -ldflags="-s -w" -o ${{ matrix.name }} ./cmd/agent

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - name: List binaries
        run: ls -la binaries/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: binaries/*
          generate_release_notes: true
